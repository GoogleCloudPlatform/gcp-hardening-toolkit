name: Enterprise Rolling Release
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for proper git diff analysis

      - name: Generate Enterprise Tag
        run: |
          SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)
          # Generates format: YYYY.MM.DD
          DATE_TAG=$(date +'%Y.%m.%d')
          echo "RELEASE_TAG=v${DATE_TAG}-${SHORT_SHA}" >> $GITHUB_ENV
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV

      - name: Check for Agent Changes
        id: agent_check
        run: |
          # Use the built-in before and after SHAs for a push event to check all changed files
          # Handle the case where the 'before' SHA might not exist (e.g., a new branch push)
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.event.after }}"

          if [[ "${BEFORE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            # If no previous commit, we can check just the current HEAD or assume change
            CHANGES=$(git ls-files | grep -E 'agent/GEMINI.md|gemini-extension.json' || true)
          else
            CHANGES=$(git diff --name-only ${BEFORE_SHA} ${AFTER_SHA} | grep -E 'agent/GEMINI.md|gemini-extension.json' || true)
          fi

          if [[ -n "$CHANGES" ]]; then
            echo "AGENT_CHANGED=true" >> $GITHUB_ENV
          else
            echo "AGENT_CHANGED=false" >> $GITHUB_ENV
          fi

      - name: Update Manifest Version
        if: env.AGENT_CHANGED == 'true'
        run: |
          # Use jq to update the literal version in the JSON (optional, if you want it committed)
          # Alternatively, we can just rely on the placeholder if we set it in the environment
          # But committing the literal version is cleaner for distribution.
          jq '.version = "${{ env.RELEASE_TAG }}"' gemini-extension.json > temp.json && mv temp.json gemini-extension.json

      - name: Commit and Push Version Change
        if: env.AGENT_CHANGED == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add gemini-extension.json
          git commit -m "chore(release): update version to ${{ env.RELEASE_TAG }} [skip ci]"
          git push origin main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Release ${{ env.RELEASE_TAG }}"
          body: "Automated rolling release for GHT. Based on commit ${{ github.sha }}."
          draft: false
          prerelease: false
